<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoundMate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto p-4 pb-28">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">RoundMate</h1>
        <p id="subhead" class="text-sm text-slate-500">Loading…</p>
      </div>
      <div class="flex flex-wrap justify-end gap-2">
        <button id="btnAddCustomer" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow">+ Customer</button>
        <button id="btnAddJob" class="px-3 py-2 rounded-xl bg-white text-slate-900 text-sm font-medium shadow border border-slate-200">+ Job</button>
        <button id="btnExportCustomers" class="px-3 py-2 rounded-xl bg-white text-slate-900 text-sm font-medium shadow border border-slate-200">Export Customers</button>
        <button id="btnExportJobs" class="px-3 py-2 rounded-xl bg-white text-slate-900 text-sm font-medium shadow border border-slate-200">Export Jobs</button>
      </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button data-tab="today" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Today</button>
      <button data-tab="week" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Week</button>
      <button data-tab="overdue" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Overdue</button>
      <button data-tab="unpaid" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Unpaid</button>
      <button data-tab="calendar" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Calendar</button>
      <button data-tab="customers" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Customers</button>
      <button data-tab="rounds" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Rounds</button>
      <button data-tab="stats" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Stats</button>
      <button data-tab="all" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">All</button>
    </div>

    <div id="notice" class="mt-4 hidden p-3 rounded-xl bg-amber-50 border border-amber-200 text-amber-900 text-sm"></div>
    <div class="mt-4" id="content"></div>
  </div>

  <div id="modalWrap" class="hidden fixed inset-0 bg-black/40 p-4 z-50">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden max-h-[90vh] flex flex-col">
      <div class="p-4 border-b border-slate-200 flex items-center justify-between shrink-0">
        <div class="font-semibold" id="modalTitle">Modal</div>
        <button id="btnCloseModal" class="px-2 py-1 rounded-lg hover:bg-slate-100 text-2xl leading-none">×</button>
      </div>
      <div class="p-4 overflow-auto" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKFnGGCcnCq9h-w8wAmvaTeecWidfD5zg",
      authDomain: "round-runner-b497b.firebaseapp.com",
      projectId: "round-runner-b497b",
      storageBucket: "round-runner-b497b.firebasestorage.app",
      messagingSenderId: "234432711618",
      appId: "1:234432711618:web:16bc2c6cef88c8da4be45b"
    };

    const SERVICES = ["Window Clean","Conservatory","Gutter Clean","Fascia + Gutters","Fascia Only"];
    const FREQS = [0, 4, 8, 12, 52];
    const PAYMENTS = ["Cash","Bank Transfer","Card","GoCardless"];
    const SOURCES = ["Leaflet","Facebook","Google","Nextdoor","Referral","Other"];

    const $ = (id) => document.getElementById(id);
    const content = $("content");
    const notice = $("notice");
    const subhead = $("subhead");
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let uid = null, activeTab = "today", customers = [], jobs = [], rounds = [];
    let customerSort = "newest", customerSearch = "", customerFilter = "active";
    let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

    function setNotice(msg){ if(!msg){notice.classList.add("hidden"); notice.textContent=""; return;} notice.textContent=msg; notice.classList.remove("hidden"); }
    function escHtml(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    function escAttr(s){ return escHtml(s); }
    function pad2(n){ return String(n).padStart(2,"0"); }
    function todayISO(d){ d=d||new Date(); const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); return x.getFullYear()+"-"+pad2(x.getMonth()+1)+"-"+pad2(x.getDate()); }
    function addDaysISO(iso,days){ const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+days); return todayISO(d); }
    function addMonthsISO(iso,months){ const d=new Date(iso+"T00:00:00"); const od=d.getDate(); d.setMonth(d.getMonth()+months); if(d.getDate()!==od)d.setDate(0); return todayISO(d); }
    function pounds(n){ return "£"+Number(n||0).toFixed(2); }
    function freqLabel(f){ f=Number(f); if(f===0)return "One-off"; if(f===52)return "12 months"; return f+" weekly"; }
    function mapLink(a,p){ return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(((a||"")+" "+(p||"")).trim()); }
    function effectiveStatus(j){ if(!j||!j.status)return "Due"; if(j.status==="Completed")return "Unpaid"; return j.status; }
    function isTs(v){ return v && typeof v.toDate === "function"; }
    function createdMs(x){ return x && isTs(x.createdAt) ? x.createdAt.toDate().getTime() : 0; }
    function startOfWeekMonday(d){ d=d||new Date(); const x=new Date(d); x.setHours(0,0,0,0); const day=x.getDay(); x.setDate(x.getDate()+(day===0?-6:1-day)); return x; }
    function startOfMonth(d){ d=d||new Date(); return new Date(d.getFullYear(),d.getMonth(),1); }
    function endOfMonth(d){ d=d||new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999); }

    function getCustomerById(id){ for(let i=0;i<customers.length;i++) if(customers[i].id===id) return customers[i]; return null; }
    function getRoundById(id){ for(let i=0;i<rounds.length;i++) if(rounds[i].id===id) return rounds[i]; return null; }
    function sortJobsByDue(list){ return list.sort((a,b)=>String(a.dueDate||"").localeCompare(String(b.dueDate||""))); }
    function paidThisWeekTotal(){ const s=startOfWeekMonday().getTime(); let t=0; jobs.forEach(j=>{ if(effectiveStatus(j)==="Paid"&&isTs(j.paidAt)&&j.paidAt.toDate().getTime()>=s)t+=Number(j.price||0); }); return t; }
    function renderSubhead(){ subhead.textContent="Ready. Synced via Firebase. • Paid this week: "+pounds(paidThisWeekTotal()); }
    function customerStats(id){ let cleans=0, paid=0, unpaid=0; jobs.forEach(j=>{ if(j.customerId!==id)return; const st=effectiveStatus(j); if(st==="Unpaid"||st==="Paid")cleans++; if(st==="Paid")paid+=Number(j.price||0); if(st==="Unpaid")unpaid+=Number(j.price||0); }); return {cleans,paid,unpaid}; }
    function getNextJobForCustomer(id){ const today=todayISO(); const list=sortJobsByDue(jobs.filter(j=>j.customerId===id&&effectiveStatus(j)!=="Paid"&&j.dueDate>=today)); return list[0]||null; }
    function getFutureJobsForRound(roundId, excludeJobId){ const today=todayISO(); return sortJobsByDue(jobs.filter(j=>j.roundId===roundId && effectiveStatus(j)!=="Paid" && j.dueDate>=today && (!excludeJobId || j.id!==excludeJobId))); }
    function getNextDateForRound(roundId, excludeJobId){ const l=getFutureJobsForRound(roundId,excludeJobId); return l.length?l[0].dueDate:""; }
    function jobsOnDate(iso){ return jobs.filter(j=>j.dueDate===iso && (effectiveStatus(j)==="Due"||effectiveStatus(j)==="Unpaid")); }

    function openModal(title, html){ $("modalTitle").textContent=title; $("modalBody").innerHTML=html; $("modalWrap").classList.remove("hidden"); }
    function closeModal(){ $("modalWrap").classList.add("hidden"); $("modalBody").innerHTML=""; }
    $("btnCloseModal").addEventListener("click",closeModal);
    $("modalWrap").addEventListener("click",e=>{ if(e.target.id==="modalWrap")closeModal(); });

    async function loadCustomers(){ customers=[]; const snap=await getDocs(query(collection(db,"customers"),where("ownerUid","==",uid))); snap.forEach(d=>customers.push({id:d.id,...d.data()})); customers.forEach(c=>{ if(c.active===undefined)c.active=true; }); customers.sort((a,b)=>createdMs(b)-createdMs(a)); }
    async function loadJobs(){ jobs=[]; const snap=await getDocs(query(collection(db,"jobs"),where("ownerUid","==",uid))); snap.forEach(d=>jobs.push({id:d.id,...d.data()})); }
    async function loadRounds(){ rounds=[]; const snap=await getDocs(query(collection(db,"rounds"),where("ownerUid","==",uid))); snap.forEach(d=>rounds.push({id:d.id,...d.data()})); rounds.sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""))); }
    async function refreshAll(){ await Promise.all([loadCustomers(),loadJobs(),loadRounds()]); renderSubhead(); render(); }

    async function createRound(data){ await addDoc(collection(db,"rounds"),{ownerUid:uid,name:data.name||"",color:data.color||"#0f172a",createdAt:serverTimestamp()}); await loadRounds(); render(); }
    async function deleteRound(id){ if(!confirm("Delete this round? Customers/jobs will keep working, but the round will be blank."))return; for(const c of customers.filter(c=>c.roundId===id))await updateDoc(doc(db,"customers",c.id),{roundId:""}); for(const j of jobs.filter(j=>j.roundId===id))await updateDoc(doc(db,"jobs",j.id),{roundId:""}); await deleteDoc(doc(db,"rounds",id)); await refreshAll(); }
    async function createCustomer(data){ await addDoc(collection(db,"customers"),{ownerUid:uid,active:true,name:data.name||"",phone:data.phone||"",email:data.email||"",address:data.address||"",postcode:data.postcode||"",preferredPayment:data.preferredPayment||"Cash",source:data.source||"",notes:data.notes||"",roundId:data.roundId||"",createdAt:serverTimestamp()}); await loadCustomers(); render(); }
    async function updateCustomer(id,data){ await updateDoc(doc(db,"customers",id),{name:data.name||"",phone:data.phone||"",email:data.email||"",address:data.address||"",postcode:data.postcode||"",preferredPayment:data.preferredPayment||"Cash",source:data.source||"",notes:data.notes||"",roundId:data.roundId||""}); await loadCustomers(); await loadJobs(); render(); }
    async function setCustomerActive(id,val){ await updateDoc(doc(db,"customers",id),{active:!!val}); await loadCustomers(); render(); }
    async function createJob(data){ await addDoc(collection(db,"jobs"),{ownerUid:uid,customerId:data.customerId,roundId:data.roundId||"",service:data.service||"Window Clean",frequencyWeeks:Number(data.frequencyWeeks||0),price:Number(data.price||0),dueDate:data.dueDate,paymentMethod:data.paymentMethod||"Cash",notes:data.notes||"",status:"Due",paid:false,createdAt:serverTimestamp()}); await loadJobs(); renderSubhead(); render(); }
    async function updateJob(id,data){ await updateDoc(doc(db,"jobs",id),{customerId:data.customerId,roundId:data.roundId||"",service:data.service||"Window Clean",frequencyWeeks:Number(data.frequencyWeeks||0),price:Number(data.price||0),dueDate:data.dueDate,paymentMethod:data.paymentMethod||"Cash",notes:data.notes||""}); await loadJobs(); renderSubhead(); render(); }
    async function deleteJob(id){ if(!confirm("Delete this job? This cannot be undone."))return; await deleteDoc(doc(db,"jobs",id)); await loadJobs(); renderSubhead(); render(); }
    async function markPaid(id){ await updateDoc(doc(db,"jobs",id),{status:"Paid",paid:true,paidAt:serverTimestamp()}); await loadJobs(); renderSubhead(); render(); }
    async function markDone(id){ const job=jobs.find(j=>j.id===id); if(!job)return; await updateDoc(doc(db,"jobs",id),{status:"Unpaid",doneAt:serverTimestamp()}); const fw=Number(job.frequencyWeeks||0); if(fw!==0){ const next=fw===52?addMonthsISO(job.dueDate||todayISO(),12):addDaysISO(job.dueDate||todayISO(),fw*7); await addDoc(collection(db,"jobs"),{ownerUid:uid,customerId:job.customerId,roundId:job.roundId||"",service:job.service||"Window Clean",frequencyWeeks:fw,price:Number(job.price||0),dueDate:next,paymentMethod:job.paymentMethod||"Cash",notes:job.notes||"",status:"Due",paid:false,createdAt:serverTimestamp()}); } await loadJobs(); renderSubhead(); render(); }
    async function skipJob(id){ const job=jobs.find(j=>j.id===id); if(!job)return; const fw=Number(job.frequencyWeeks||0); if(fw===0){ if(confirm("This is a one-off job. Delete it instead?")) await deleteJob(id); return; } const next=fw===52?addMonthsISO(job.dueDate||todayISO(),12):addDaysISO(job.dueDate||todayISO(),fw*7); await updateDoc(doc(db,"jobs",id),{dueDate:next,skippedAt:serverTimestamp(),status:"Due"}); await loadJobs(); render(); }

    function messagePayment(job,c){return `Hi ${c&&c.name?c.name:"there"}, just a quick reminder your window clean payment of ${pounds(job&&job.price?job.price:0)} is still outstanding. Thanks, Lewis.`;}
    function messageCleaned(job,c){return `Hi ${c&&c.name?c.name:"there"}, your windows have been cleaned today. Amount due is ${pounds(job&&job.price?job.price:0)}. Thanks, Lewis.`;}
    function messageReview(c){return `Hi ${c&&c.name?c.name:"there"}, thanks again for using me for your window cleaning. If you're happy with the service, a quick Google review would really help. Thanks, Lewis.`;}
    function messageInvoice(job,c){const parts=[]; if(c&&c.address)parts.push(c.address); if(c&&c.postcode)parts.push(c.postcode); return `Hi ${c&&c.name?c.name:"there"}\n\nYour ${job&&job.service?job.service:"Window Clean"} (${job&&job.dueDate?job.dueDate:""}) is done.\n\nAmount due: ${pounds(job&&job.price?job.price:0)}\n${parts.length?"Address: "+parts.join(", "):""}\n\nThanks, Lewis`;}
    async function copyToClipboard(text){ try{await navigator.clipboard.writeText(text); setNotice("Message copied ✅"); setTimeout(()=>setNotice(""),2500);}catch(e){prompt("Copy this message:",text);} }

    function setTabsUI(){ document.querySelectorAll(".tab").forEach(b=>{const is=b.dataset.tab===activeTab; b.className="tab px-3 py-2 rounded-xl text-sm font-medium border "+(is?"bg-slate-900 text-white border-slate-900 shadow":"bg-white text-slate-900 border-slate-200");}); }
    function pill(st){ if(st==="Paid")return `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200">Paid</span>`; if(st==="Unpaid")return `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-amber-50 text-amber-800 border border-amber-200">Unpaid</span>`; return ""; }
    function rBadge(r){ if(!r)return""; const c=r.color||"#0f172a"; return `<span class="ml-2 text-xs px-2 py-1 rounded-lg border" style="background:${escAttr(c)}22;color:${escAttr(c)};border-color:${escAttr(c)}55">${escHtml(r.name)}</span>`; }

    function jobCard(job){ const c=getCustomerById(job.customerId), r=getRoundById(job.roundId||""), st=effectiveStatus(job), notes=job.notes||(c&&c.notes?c.notes:""); const addr=c&&c.address?c.address:"", pc=c&&c.postcode?c.postcode:""; let btn=""; if(st==="Due")btn=`<button data-action="done" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Done</button><button data-action="paid" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Paid</button><button data-action="skipJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Skip</button><button data-action="reschedule" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Reschedule</button>`; else if(st==="Unpaid")btn=`<button data-action="paid" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Paid</button><button data-action="paymentReminder" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Reminder</button>`; btn+=`<button data-action="viewJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">View</button><button data-action="editJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button><button data-action="deleteJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Delete</button><button data-action="invoice" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Invoice</button>`; return `<div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-3"><div class="text-sm text-slate-500">${job.dueDate||""} • ${st}${pill(st)}${rBadge(r)}</div><div class="font-semibold">${escHtml(c&&c.name?c.name:"Unknown customer")}</div><div class="text-sm text-slate-700 mt-1">${escHtml(job.service||"")} • ${escHtml(freqLabel(job.frequencyWeeks))} • <span class="font-semibold">${pounds(job.price)}</span></div><div class="text-sm text-slate-600 mt-2">${escHtml(addr+(pc?", "+pc:""))}</div><a class="text-sm underline" target="_blank" href="${mapLink(addr,pc)}">Open in Maps</a>${notes?`<div class="text-sm text-slate-500 mt-2 whitespace-pre-wrap">${escHtml(notes)}</div>`:""}<div class="mt-3 flex flex-wrap gap-2">${btn}</div></div>`; }

    function customerCard(c){ const r=getRoundById(c.roundId||""), next=getNextJobForCustomer(c.id), stats=customerStats(c.id), active=c.active!==false, since=isTs(c.createdAt)?todayISO(c.createdAt.toDate()).split("-").reverse().join("/"):"—"; return `<div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-3 ${active?"":"opacity-70"}"><div class="flex items-start justify-between gap-3"><div><div class="font-semibold">${escHtml(c.name||"Unnamed")} ${active?"":"<span class='ml-2 text-xs px-2 py-1 rounded-lg bg-slate-100'>Disabled</span>"}${rBadge(r)}</div><div class="text-sm text-slate-600">${escHtml((c.address||"")+(c.postcode?" "+c.postcode:""))}</div><div class="text-sm text-slate-600">${escHtml(c.phone||"")}</div><div class="text-sm text-slate-500 mt-2">Next clean: ${next?next.dueDate+" • "+escHtml(next.service||"")+" • "+pounds(next.price):"No upcoming job"}</div><div class="text-xs text-slate-500 mt-2">${stats.cleans} cleans • Paid ${pounds(stats.paid)} • Unpaid ${pounds(stats.unpaid)} • Since ${since}</div>${c.notes?`<div class="text-sm text-slate-500 mt-2 whitespace-pre-wrap">${escHtml(c.notes)}</div>`:""}</div><div class="flex flex-col gap-2"><button data-action="viewCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">View</button><button data-action="editCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button>${active?`<button data-action="disableCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Disable</button>`:`<button data-action="enableCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Enable</button>`}</div></div></div>`; }

    function wireJobs(root){ root=root||content; root.querySelectorAll('[data-action="done"]').forEach(b=>b.onclick=()=>markDone(b.dataset.id)); root.querySelectorAll('[data-action="paid"]').forEach(b=>b.onclick=()=>markPaid(b.dataset.id)); root.querySelectorAll('[data-action="skipJob"]').forEach(b=>b.onclick=()=>skipJob(b.dataset.id)); root.querySelectorAll('[data-action="reschedule"]').forEach(b=>b.onclick=()=>openReschedule(b.dataset.id)); root.querySelectorAll('[data-action="editJob"]').forEach(b=>b.onclick=()=>openEditJob(b.dataset.id)); root.querySelectorAll('[data-action="deleteJob"]').forEach(b=>b.onclick=()=>deleteJob(b.dataset.id)); root.querySelectorAll('[data-action="viewJob"]').forEach(b=>b.onclick=()=>openJobDetails(b.dataset.id)); root.querySelectorAll('[data-action="invoice"]').forEach(b=>b.onclick=()=>{const j=jobs.find(x=>x.id===b.dataset.id), c=j?getCustomerById(j.customerId):null; copyToClipboard(messageInvoice(j,c));}); root.querySelectorAll('[data-action="paymentReminder"]').forEach(b=>b.onclick=()=>{const j=jobs.find(x=>x.id===b.dataset.id), c=j?getCustomerById(j.customerId):null; copyToClipboard(messagePayment(j,c));}); }
    function wireCustomers(){ content.querySelectorAll('[data-action="disableCustomer"]').forEach(b=>b.onclick=()=>setCustomerActive(b.dataset.id,false)); content.querySelectorAll('[data-action="enableCustomer"]').forEach(b=>b.onclick=()=>setCustomerActive(b.dataset.id,true)); content.querySelectorAll('[data-action="editCustomer"]').forEach(b=>b.onclick=()=>openEditCustomer(b.dataset.id)); content.querySelectorAll('[data-action="viewCustomer"]').forEach(b=>b.onclick=()=>openCustomerDetails(b.dataset.id)); }

    function renderCustomers(){ let list=customers.slice(); if(customerFilter==="active")list=list.filter(c=>c.active!==false); if(customerFilter==="inactive")list=list.filter(c=>c.active===false); if(customerSearch.trim()){const q=customerSearch.toLowerCase(); list=list.filter(c=>String(c.name||"").toLowerCase().includes(q)||String(c.address||"").toLowerCase().includes(q)||String(c.postcode||"").toLowerCase().includes(q));} list.sort((a,b)=>customerSort==="name"?String(a.name||"").localeCompare(String(b.name||"")):customerSort==="round"?String((getRoundById(a.roundId||"")||{}).name||"").localeCompare(String((getRoundById(b.roundId||"")||{}).name||"")):createdMs(b)-createdMs(a)); content.innerHTML=`<div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-4"><div class="grid gap-3 md:grid-cols-[1fr_180px_180px]"><input id="customerSearch" value="${escAttr(customerSearch)}" placeholder="Search name, address, postcode..." class="px-3 py-2 rounded-xl border border-slate-200" /><select id="customerSort" class="px-3 py-2 rounded-xl border border-slate-200"><option value="newest" ${customerSort==="newest"?"selected":""}>Newest first</option><option value="name" ${customerSort==="name"?"selected":""}>A-Z</option><option value="round" ${customerSort==="round"?"selected":""}>Round</option></select><select id="customerFilter" class="px-3 py-2 rounded-xl border border-slate-200"><option value="active" ${customerFilter==="active"?"selected":""}>Active</option><option value="inactive" ${customerFilter==="inactive"?"selected":""}>Inactive</option><option value="all" ${customerFilter==="all"?"selected":""}>All</option></select></div></div>${list.length?list.map(customerCard).join(""):`<div class="p-4 rounded-2xl bg-white border border-slate-200 text-slate-600">No customers found.</div>`}`; $("customerSearch").oninput=e=>{customerSearch=e.target.value;renderCustomers();}; $("customerSort").onchange=e=>{customerSort=e.target.value;renderCustomers();}; $("customerFilter").onchange=e=>{customerFilter=e.target.value;renderCustomers();}; wireCustomers(); }
    function renderJobs(list){ if(!list.length){content.innerHTML=`<div class="p-4 rounded-2xl bg-white border border-slate-200 text-slate-600">Nothing here.</div>`;return;} content.innerHTML=list.map(jobCard).join(""); wireJobs(); }

    function downloadCSV(filename,rows){ if(!rows.length){alert("Nothing to export.");return;} const h=Object.keys(rows[0]); const csv=[h.join(",")].concat(rows.map(r=>h.map(k=>'"'+String(r[k]===undefined||r[k]===null?"":r[k]).replace(/"/g,'""')+'"').join(","))).join("\n"); const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); }
    $("btnExportCustomers").onclick=()=>downloadCSV("roundmate-customers.csv",customers.map(c=>{const r=getRoundById(c.roundId||""),s=customerStats(c.id); return {name:c.name||"",phone:c.phone||"",email:c.email||"",address:c.address||"",postcode:c.postcode||"",payment:c.preferredPayment||"",source:c.source||"",round:r?r.name:"",notes:c.notes||"",active:c.active!==false?"active":"disabled",cleans:s.cleans,paidTotal:s.paid,unpaidTotal:s.unpaid};}));
    $("btnExportJobs").onclick=()=>downloadCSV("roundmate-jobs.csv",jobs.map(j=>{const c=getCustomerById(j.customerId),r=getRoundById(j.roundId||""); return {customerName:c&&c.name?c.name:"",address:c&&c.address?c.address:"",postcode:c&&c.postcode?c.postcode:"",service:j.service||"",dueDate:j.dueDate||"",frequency:freqLabel(j.frequencyWeeks),price:j.price||"",status:effectiveStatus(j),paid:j.paid?"yes":"no",paymentMethod:j.paymentMethod||"",round:r&&r.name?r.name:"",notes:j.notes||""};}));

    document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab; render();});
    $("btnAddCustomer").onclick=openAddCustomer;
    $("btnAddJob").onclick=()=>openAddJob();
    onAuthStateChanged(auth, async user=>{ if(!user)return; uid=user.uid; await refreshAll(); });
    async function boot(){ subhead.textContent="Signing in…"; try{await signInAnonymously(auth);}catch(e){subhead.textContent="Auth error. Enable Anonymous Auth in Firebase."; console.error(e);} }
    boot();
  </script>
</body>
</html>
