<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clearflow V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">
  <div class="max-w-4xl mx-auto p-4 pb-28">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Clearflow</h1>
        <p id="subhead" class="text-sm text-slate-500">Loading…</p>
      </div>
      <div class="flex gap-2">
        <button id="btnAddCustomer" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow">+ Customer</button>
        <button id="btnAddJob" class="px-3 py-2 rounded-xl bg-white text-slate-900 text-sm font-medium shadow border border-slate-200">+ Job</button>
      </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button data-tab="today" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Today</button>
      <button data-tab="week" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Week</button>
      <button data-tab="overdue" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Overdue</button>
      <button data-tab="unpaid" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Unpaid</button>
      <button data-tab="calendar" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Calendar</button>
      <button data-tab="customers" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Customers</button>
      <button data-tab="rounds" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">Rounds</button>
      <button data-tab="all" class="tab px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">All</button>
    </div>

    <div id="notice" class="mt-4 hidden p-3 rounded-xl bg-amber-50 border border-amber-200 text-amber-900 text-sm"></div>
    <div class="mt-4" id="content"></div>
  </div>

  <div id="modalWrap" class="hidden fixed inset-0 bg-black/40 p-4 z-50">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden max-h-[90vh] flex flex-col">
      <div class="p-4 border-b border-slate-200 flex items-center justify-between shrink-0">
        <div class="font-semibold" id="modalTitle">Modal</div>
        <button id="btnCloseModal" class="px-2 py-1 rounded-lg hover:bg-slate-100 text-2xl leading-none">×</button>
      </div>
      <div class="p-4 overflow-auto" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, query, where,
      updateDoc, doc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBKFnGGCcnCq9h-w8wAmvaTeecWidfD5zg",
      authDomain: "round-runner-b497b.firebaseapp.com",
      projectId: "round-runner-b497b",
      storageBucket: "round-runner-b497b.firebasestorage.app",
      messagingSenderId: "234432711618",
      appId: "1:234432711618:web:16bc2c6cef88c8da4be45b"
    };

    const SERVICES = ["Window Clean","Conservatory","Gutter Clean","Fascia + Gutters","Fascia Only"];
    const FREQS = [0, 4, 8, 12, 52];
    const PAYMENTS = ["Cash","Bank Transfer"];

    const $ = (id) => document.getElementById(id);
    const content = $("content");
    const notice = $("notice");
    const subhead = $("subhead");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let uid = null;
    let activeTab = "today";
    let customers = [];
    let jobs = [];
    let rounds = [];

    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    function setNotice(msg) {
      if (!msg) {
        notice.classList.add("hidden");
        notice.textContent = "";
        return;
      }
      notice.textContent = msg;
      notice.classList.remove("hidden");
    }

    function escHtml(s) {
      return String(s || "").replace(/[&<>"']/g, function(c) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[c];
      });
    }

    function escAttr(s) {
      return escHtml(s);
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function todayISO(d) {
      d = d || new Date();
      const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      return x.getFullYear() + "-" + pad2(x.getMonth() + 1) + "-" + pad2(x.getDate());
    }

    function addDaysISO(iso, days) {
      const d = new Date(iso + "T00:00:00");
      d.setDate(d.getDate() + days);
      return todayISO(d);
    }

    function addMonthsISO(iso, months) {
      const d = new Date(iso + "T00:00:00");
      const originalDay = d.getDate();
      d.setMonth(d.getMonth() + months);
      if (d.getDate() !== originalDay) {
        d.setDate(0);
      }
      return todayISO(d);
    }

    function pounds(n) {
      return "£" + Number(n || 0).toFixed(2);
    }

    function freqLabel(f) {
      f = Number(f);
      if (f === 0) return "One-off";
      if (f === 52) return "12 months";
      return f + " weekly";
    }

    function mapLink(address, postcode) {
      const q = encodeURIComponent(((address || "") + " " + (postcode || "")).trim());
      return "https://www.google.com/maps/search/?api=1&query=" + q;
    }

    function monthName(m) {
      return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m];
    }

    function startOfMonthDow(y, m) {
      const dow = new Date(y, m, 1).getDay(); // 0 Sun
      return dow === 0 ? 6 : dow - 1; // Monday based
    }

    function daysInMonth(y, m) {
      return new Date(y, m + 1, 0).getDate();
    }

    function isoFromYMD(y, m, d) {
      return y + "-" + pad2(m + 1) + "-" + pad2(d);
    }

    function startOfWeekMonday(d) {
      d = d || new Date();
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      const day = x.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      x.setDate(x.getDate() + diff);
      return x;
    }

    function isFirestoreTimestamp(v) {
      return v && typeof v.toDate === "function";
    }

    function effectiveStatus(job) {
      // supports older "Completed" data by treating it like Unpaid
      if (!job || !job.status) return "Due";
      if (job.status === "Completed") return "Unpaid";
      return job.status;
    }

    function paidThisWeekTotal() {
      const start = startOfWeekMonday().getTime();
      let total = 0;
      for (let i = 0; i < jobs.length; i++) {
        const j = jobs[i];
        if (!j) continue;
        if (effectiveStatus(j) !== "Paid") continue;
        if (!isFirestoreTimestamp(j.paidAt)) continue;
        if (j.paidAt.toDate().getTime() >= start) total += Number(j.price || 0);
      }
      return total;
    }

    function renderSubhead() {
      subhead.textContent = "Ready. Synced via Firebase. • Paid this week: " + pounds(paidThisWeekTotal());
    }

    function sortCustomersInPlace() {
      customers.sort(function(a, b) {
        const an = String((a && a.name) || "").toLowerCase();
        const bn = String((b && b.name) || "").toLowerCase();
        return an.localeCompare(bn);
      });
    }

    function sortRoundsInPlace() {
      rounds.sort(function(a, b) {
        const an = String((a && a.name) || "").toLowerCase();
        const bn = String((b && b.name) || "").toLowerCase();
        return an.localeCompare(bn);
      });
    }

    function sortJobsByDue(list) {
      list.sort(function(a, b) {
        const ad = String((a && a.dueDate) || "");
        const bd = String((b && b.dueDate) || "");
        if (ad < bd) return -1;
        if (ad > bd) return 1;
        return 0;
      });
      return list;
    }

    function getCustomerById(id) {
      for (let i = 0; i < customers.length; i++) {
        if (customers[i].id === id) return customers[i];
      }
      return null;
    }

    function getRoundById(id) {
      for (let i = 0; i < rounds.length; i++) {
        if (rounds[i].id === id) return rounds[i];
      }
      return null;
    }

    function getNextJobForCustomer(customerId) {
      const today = todayISO();
      const list = jobs.filter(function(j) {
        const st = effectiveStatus(j);
        return j.customerId === customerId && st !== "Paid" && j.dueDate >= today;
      });
      sortJobsByDue(list);
      return list.length ? list[0] : null;
    }

    function getFutureJobsForRound(roundId, excludeJobId) {
      const today = todayISO();
      const list = jobs.filter(function(j) {
        const st = effectiveStatus(j);
        if (excludeJobId && j.id === excludeJobId) return false;
        return j.roundId === roundId && st !== "Paid" && j.dueDate >= today;
      });
      sortJobsByDue(list);
      return list;
    }

    function getNextDateForRound(roundId, excludeJobId) {
      const list = getFutureJobsForRound(roundId, excludeJobId);
      return list.length ? list[0].dueDate : "";
    }

    function jobsOnDate(iso) {
      return jobs.filter(function(j) {
        const st = effectiveStatus(j);
        return j.dueDate === iso && (st === "Due" || st === "Unpaid");
      });
    }

    function openModal(title, bodyHtml) {
      $("modalTitle").textContent = title;
      $("modalBody").innerHTML = bodyHtml;
      $("modalWrap").classList.remove("hidden");
    }

    function closeModal() {
      $("modalWrap").classList.add("hidden");
      $("modalBody").innerHTML = "";
    }

    $("btnCloseModal").addEventListener("click", closeModal);
    $("modalWrap").addEventListener("click", function(e) {
      if (e.target.id === "modalWrap") closeModal();
    });

    async function loadCustomers() {
      customers = [];
      const qy = query(collection(db, "customers"), where("ownerUid", "==", uid));
      const snap = await getDocs(qy);
      snap.forEach(function(d) {
        customers.push({ id: d.id, ...d.data() });
      });
      for (let i = 0; i < customers.length; i++) {
        if (customers[i].active === undefined) customers[i].active = true;
      }
      sortCustomersInPlace();
    }

    async function loadJobs() {
      jobs = [];
      const qy = query(collection(db, "jobs"), where("ownerUid", "==", uid));
      const snap = await getDocs(qy);
      snap.forEach(function(d) {
        jobs.push({ id: d.id, ...d.data() });
      });
    }

    async function loadRounds() {
      rounds = [];
      const qy = query(collection(db, "rounds"), where("ownerUid", "==", uid));
      const snap = await getDocs(qy);
      snap.forEach(function(d) {
        rounds.push({ id: d.id, ...d.data() });
      });
      sortRoundsInPlace();
    }

    async function refreshAll() {
      await Promise.all([loadCustomers(), loadJobs(), loadRounds()]);
      renderSubhead();
      render();
    }

    async function createRound(data) {
      await addDoc(collection(db, "rounds"), {
        ownerUid: uid,
        name: data.name || "",
        color: data.color || "#0f172a",
        createdAt: serverTimestamp()
      });
      await loadRounds();
      render();
    }

    async function deleteRound(roundId) {
      const ok = confirm("Delete this round? Customers/jobs will keep working, but the round will be blank.");
      if (!ok) return;

      // clear from customers
      const custs = customers.filter(function(c) { return c.roundId === roundId; });
      for (let i = 0; i < custs.length; i++) {
        await updateDoc(doc(db, "customers", custs[i].id), { roundId: "" });
      }

      // clear from jobs
      const js = jobs.filter(function(j) { return j.roundId === roundId; });
      for (let i = 0; i < js.length; i++) {
        await updateDoc(doc(db, "jobs", js[i].id), { roundId: "" });
      }

      await deleteDoc(doc(db, "rounds", roundId));
      await refreshAll();
    }

    async function createCustomer(data) {
      await addDoc(collection(db, "customers"), {
        ownerUid: uid,
        active: true,
        name: data.name || "",
        phone: data.phone || "",
        email: data.email || "",
        address: data.address || "",
        postcode: data.postcode || "",
        preferredPayment: data.preferredPayment || "Cash",
        notes: data.notes || "",
        roundId: data.roundId || "",
        createdAt: serverTimestamp()
      });
      await loadCustomers();
      render();
    }

    async function updateCustomer(customerId, data) {
      await updateDoc(doc(db, "customers", customerId), {
        name: data.name || "",
        phone: data.phone || "",
        email: data.email || "",
        address: data.address || "",
        postcode: data.postcode || "",
        preferredPayment: data.preferredPayment || "Cash",
        notes: data.notes || "",
        roundId: data.roundId || ""
      });
      await loadCustomers();
      render();
    }

    async function setCustomerActive(customerId, isActive) {
      await updateDoc(doc(db, "customers", customerId), { active: !!isActive });
      await loadCustomers();
      render();
    }

    async function createJob(data) {
      await addDoc(collection(db, "jobs"), {
        ownerUid: uid,
        customerId: data.customerId,
        roundId: data.roundId || "",
        service: data.service || "Window Clean",
        frequencyWeeks: Number(data.frequencyWeeks || 0),
        price: Number(data.price || 0),
        dueDate: data.dueDate,
        paymentMethod: data.paymentMethod || "Cash",
        notes: data.notes || "",
        status: "Due",
        paid: false,
        createdAt: serverTimestamp()
      });
      await loadJobs();
      renderSubhead();
      render();
    }

    async function updateJob(jobId, data) {
      await updateDoc(doc(db, "jobs", jobId), {
        customerId: data.customerId,
        roundId: data.roundId || "",
        service: data.service || "Window Clean",
        frequencyWeeks: Number(data.frequencyWeeks || 0),
        price: Number(data.price || 0),
        dueDate: data.dueDate,
        paymentMethod: data.paymentMethod || "Cash",
        notes: data.notes || ""
      });
      await loadJobs();
      renderSubhead();
      render();
    }

    async function deleteJob(jobId) {
      const ok = confirm("Delete this job?");
      if (!ok) return;
      await deleteDoc(doc(db, "jobs", jobId));
      await loadJobs();
      renderSubhead();
      render();
    }

    async function markDone(jobId) {
      let job = null;
      for (let i = 0; i < jobs.length; i++) {
        if (jobs[i].id === jobId) { job = jobs[i]; break; }
      }
      if (!job) return;

      await updateDoc(doc(db, "jobs", jobId), {
        status: "Unpaid",
        doneAt: serverTimestamp()
      });

      const fw = Number(job.frequencyWeeks || 0);
      if (fw !== 0) {
        const baseDue = job.dueDate || todayISO();
        let nextDue = baseDue;
        if (fw === 52) nextDue = addMonthsISO(baseDue, 12);
        else nextDue = addDaysISO(baseDue, fw * 7);

        await addDoc(collection(db, "jobs"), {
          ownerUid: uid,
          customerId: job.customerId,
          roundId: job.roundId || "",
          service: job.service || "Window Clean",
          frequencyWeeks: fw,
          price: Number(job.price || 0),
          dueDate: nextDue,
          paymentMethod: job.paymentMethod || "Cash",
          notes: job.notes || "",
          status: "Due",
          paid: false,
          createdAt: serverTimestamp()
        });
      }

      await loadJobs();
      renderSubhead();
      render();
    }

    async function markPaid(jobId) {
      await updateDoc(doc(db, "jobs", jobId), {
        status: "Paid",
        paid: true,
        paidAt: serverTimestamp()
      });
      await loadJobs();
      renderSubhead();
      render();
    }

    function makeInvoiceText(job, customer) {
      const name = (customer && customer.name) ? customer.name : "there";
      const when = job && job.dueDate ? job.dueDate : "";
      const service = job && job.service ? job.service : "Window Clean";
      const price = pounds(job && job.price ? job.price : 0);

      const addrParts = [];
      if (customer && customer.address) addrParts.push(customer.address);
      if (customer && customer.postcode) addrParts.push(customer.postcode);
      const addrLine = addrParts.length ? ("Address: " + addrParts.join(", ")) : "";

      return (
`Hi ${name},

Just a quick one — your ${service} (${when}) is done.

Amount due: ${price}
${addrLine}

Thanks,
Lewis (Clearflow)`
      );
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        setNotice("Invoice message copied ✅");
        setTimeout(function() { setNotice(""); }, 2500);
      } catch (e) {
        prompt("Copy this message:", text);
      }
    }

    function setTabsUI() {
      document.querySelectorAll(".tab").forEach(function(b) {
        const is = b.dataset.tab === activeTab;
        b.className =
          "tab px-3 py-2 rounded-xl text-sm font-medium border " +
          (is ? "bg-slate-900 text-white border-slate-900 shadow"
              : "bg-white text-slate-900 border-slate-200");
      });
    }

    function customerCard(c) {
      const isActive = c.active !== false;
      const badge = isActive
        ? `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200">Active</span>`
        : `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-700 border border-slate-200">Disabled</span>`;

      const round = getRoundById(c.roundId || "");
      const nextJob = getNextJobForCustomer(c.id);
      const nextLine = nextJob
        ? `${nextJob.dueDate} • ${escHtml(nextJob.service || "")} • ${pounds(nextJob.price)} • ${escHtml(freqLabel(nextJob.frequencyWeeks))}`
        : "No upcoming job";

      const roundHtml = round
        ? `<span class="inline-block mt-2 text-xs px-2 py-1 rounded-full border" style="background:${escAttr(round.color || "#0f172a")}22;color:${escAttr(round.color || "#0f172a")};border-color:${escAttr(round.color || "#0f172a")}55">${escHtml(round.name)}</span>`
        : "";

      return `
        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-3 ${isActive ? "" : "opacity-70"}">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="font-semibold">${escHtml(c.name || "Unnamed")} ${badge}</div>
              <div class="text-sm text-slate-600">${escHtml((c.address || "") + (c.postcode ? (" " + c.postcode) : ""))}</div>
              <div class="text-sm text-slate-600">${escHtml(c.phone || "")}</div>
              ${roundHtml}
              <div class="text-sm text-slate-500 mt-2">Next clean: ${nextLine}</div>
              ${c.notes ? `<div class="text-sm text-slate-500 mt-2 whitespace-pre-wrap">${escHtml(c.notes)}</div>` : ""}
            </div>
            <div class="flex flex-col gap-2">
              <button data-action="viewCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">View</button>
              <button data-action="editCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button>
              ${
                isActive
                  ? `<button data-action="disableCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Disable</button>`
                  : `<button data-action="enableCustomer" data-id="${c.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Enable</button>`
              }
            </div>
          </div>
        </div>
      `;
    }

    function jobCard(job) {
      const c = getCustomerById(job.customerId);
      const round = getRoundById(job.roundId || "");
      const name = c && c.name ? c.name : "Unknown customer";
      const addr = c && c.address ? c.address : "";
      const pc = c && c.postcode ? c.postcode : "";
      const fullAddr = addr + (pc ? (", " + pc) : "");

      const status = effectiveStatus(job);
      const paidBadge = status === "Paid"
        ? `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200">Paid</span>` : "";
      const unpaidBadge = status === "Unpaid"
        ? `<span class="ml-2 text-xs px-2 py-1 rounded-lg bg-amber-50 text-amber-800 border border-amber-200">Unpaid</span>` : "";
      const roundBadge = round
        ? `<span class="ml-2 text-xs px-2 py-1 rounded-lg border" style="background:${escAttr(round.color || "#0f172a")}22;color:${escAttr(round.color || "#0f172a")};border-color:${escAttr(round.color || "#0f172a")}55">${escHtml(round.name)}</span>`
        : "";
      const notesHtml = job.notes ? `<div class="text-sm text-slate-500 mt-2 whitespace-pre-wrap">${escHtml(job.notes)}</div>` : "";

      let buttons = "";
      if (status === "Due") {
        buttons = `
          <button data-action="done" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Done</button>
          <button data-action="viewJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">View</button>
          <button data-action="editJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button>
          <button data-action="deleteJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Delete</button>
        `;
      } else if (status === "Unpaid") {
        buttons = `
          <button data-action="paid" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm">Paid</button>
          <button data-action="viewJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">View</button>
          <button data-action="editJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button>
          <button data-action="deleteJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Delete</button>
        `;
      } else {
        buttons = `
          <button data-action="viewJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">View</button>
          <button data-action="editJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Edit</button>
          <button data-action="deleteJob" data-id="${job.id}" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Delete</button>
        `;
      }

      return `
        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-3">
          <div class="text-sm text-slate-500">${job.dueDate || ""} • ${status}${paidBadge}${unpaidBadge}${roundBadge}</div>
          <div class="font-semibold">${escHtml(name)}</div>
          <div class="text-sm text-slate-700 mt-1">

    function renderCalendar() {
      const firstDow = startOfMonthDow(calYear, calMonth);
      const dim = daysInMonth(calYear, calMonth);
      const cells = [];

      for (let i = 0; i < 42; i++) {
        const dayNum = i - firstDow + 1;

        if (dayNum < 1 || dayNum > dim) {
          cells.push(`<div class="min-h-[96px] bg-white/40 border border-slate-200 rounded-2xl p-2"></div>`);
          continue;
        }

        const iso = isoFromYMD(calYear, calMonth, dayNum);
        const list = jobsOnDate(iso);

        const items = list.slice(0, 3).map(function(j) {
          const c = getCustomerById(j.customerId);
          const addr = c && c.address ? c.address : "No address";
          return `
            <div class="text-xs truncate">
              <span class="font-medium">${escHtml(addr)}</span>
              <span class="text-slate-500">• ${pounds(j.price)}</span>
            </div>
          `;
        }).join("");

        const more = list.length > 3
          ? `<div class="text-[11px] text-slate-500 mt-1">+${list.length - 3} more</div>`
          : "";

        cells.push(`
          <button data-cal-date="${iso}" class="text-left min-h-[96px] bg-white border border-slate-200 rounded-2xl p-2 hover:border-slate-400">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold">${dayNum}</div>
              ${list.length ? `<div class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 border border-slate-200">${list.length}</div>` : ""}
            </div>
            <div class="mt-1 space-y-1">
              ${items || `<div class="text-xs text-slate-400">No jobs</div>`}
              ${more}
            </div>
          </button>
        `);
      }

      content.innerHTML = `
        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
          <div class="flex items-center justify-between gap-3">
            <div class="font-semibold text-lg">${monthName(calMonth)} ${calYear}</div>
            <div class="flex gap-2">
              <button id="calPrev" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">◀</button>
              <button id="calToday" class="px-3 py-2 rounded-xl bg-white border border-slate-200 text-sm">Today</button>

          </div>

            <div class="text-center">Tue</div>
            <div class="text-center">Wed</div>
            <div class="text-center">Thu</div>
            <div class="text-center">Fri</div>
            <div class="text-center">Sat</div>
            <div class="text-center">Sun</div>
          </div>

          <div class="mt-2 grid grid-cols-7 gap-2">
            ${cells.join("")}
          </div>

          <div class="mt-3 text-xs text-slate-500">
            Tap a day to see jobs, address + price, then tap a row for full details.
          </div>
        </div>
      `;

      document.getElementById("calPrev").addEventListener("click", function() {
        calMonth -= 1;
        if (calMonth < 0) { calMonth = 11; calYear -= 1; }
        renderCalendar();
      });

      document.getElementById("calNext").addEventListener("click", function() {

        renderCalendar();
      });

      document.getElementById("calToday").addEventListener("click", function() {

        calYear = d.getFullYear();
        calMonth = d.getMonth();
        renderCalendar();
      });

    function render() {
      setTabsUI();
      renderSubhead();

      if (activeTab === "customers") {
        renderCustomers();
        return;
      }

      if (activeTab === "rounds") {
        renderRounds();
        return;
      }

      if (activeTab === "calendar") {
        renderCalendar();
        return;
      }

      const t = todayISO();
      const weekEnd = addDaysISO(t, 6);

      let list = jobs.slice();

      if (activeTab !== "all") {
        list = list.filter(function(j) { return effectiveStatus(j) !== "Paid"; });
      }

      if (activeTab === "unpaid") {
        list = list.filter(function(j) { return effectiveStatus(j) === "Unpaid"; });
        sortJobsByDue(list);
        renderJobs(list);
        return;
      }

      if (activeTab === "today") {
        list = list.filter(function(j) { return effectiveStatus(j) === "Due" && j.dueDate === t; });
      } else if (activeTab === "week") {
        list = list.filter(function(j) { return effectiveStatus(j) === "Due" && j.dueDate >= t && j.dueDate <= weekEnd; });
      } else if (activeTab === "overdue") {
        list = list.filter(function(j) { return effectiveStatus(j) === "Due" && j.dueDate < t; });
      } else if (activeTab === "all") {
        // everything
      }

      sortJobsByDue(list);
      renderJobs(list);
    }

    function setupRoundAutoFill(formId, currentJobId) {
      const form = document.getElementById(formId);
      if (!form) return;

      const roundSel = form.querySelector('[name="roundId"]');
      const dueInput = form.querySelector('[name="dueDate"]');
      const hint = form.querySelector('[data-round-hint]');
      const custSel = form.querySelector('[name="customerId"]');

      function updateHintAndDate(fromCustomer) {
        const roundId = roundSel ? roundSel.value : "";
        if (!roundId) {
          if (hint) hint.textContent = "No round selected.";
          return;
        }

        const nextDate = getNextDateForRound(roundId, currentJobId || "");
        const count = getFutureJobsForRound(roundId, currentJobId || "").length;

        if (hint) {
          if (nextDate) hint.textContent = "Next round date: " + nextDate + " (" + count + " job" + (count === 1 ? "" : "s") + ")";
          else hint.textContent = "No future jobs found in this round yet.";
        }

        if (nextDate) {
          dueInput.value = nextDate;
        }
      }

      if (custSel && roundSel) {
        custSel.addEventListener("change", function() {
          const cust = getCustomerById(custSel.value);
          if (cust && cust.roundId) {
            roundSel.value = cust.roundId;
          }
          updateHintAndDate(true);
        });
      }

      if (roundSel) {
        roundSel.addEventListener("change", function() {
          updateHintAndDate(false);
        });
      }

      updateHintAndDate(false);
    }

          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="grid gap-1">
              <label class="text-sm font-medium">Postcode</label>
              <input name="postcode" value="${escAttr(c.postcode || "")}" class="px-3 py-2 rounded-xl border border-slate-200" />
            </div>
            <div class="grid gap-1">
              <label class="text-sm font-medium">Payment</label>
              <select name="preferredPayment" class="px-3 py-2 rounded-xl border border-slate-200">
                ${PAYMENTS.map(function(p) { return `<option ${((c.preferredPayment || "Cash") === p) ? "selected" : ""}>${p}</option>`; }).join("")}
              </select>
            </div>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Default round</label>
            <select name="roundId" class="px-3 py-2 rounded-xl border border-slate-200">
              ${roundOptionsHtml(c.roundId || "")}
            </select>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Notes</label>
            <textarea name="notes" rows="3" class="px-3 py-2 rounded-xl border border-slate-200">${escHtml(c.notes || "")}</textarea>
          </div>

          <button class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow">Save</button>
        </form>
      `);

      document.getElementById("fEditCustomer").addEventListener("submit", async function(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        await updateCustomer(customerId, Object.fromEntries(fd.entries()));
        closeModal();
      });
    }

    function openAddJob(prefillDate, prefillCustomerId) {
      const activeCustomers = customers.filter(function(c) { return c.active !== false; });

      if (!activeCustomers.length) {
        setNotice("Add a customer first (or enable one).");
        activeTab = "customers";
        render();
        return;
      }

      const customerId = prefillCustomerId || activeCustomers[0].id;
      const customer = getCustomerById(customerId);
      const defaultRoundId = customer && customer.roundId ? customer.roundId : "";
      const initialDate = prefillDate || getNextDateForRound(defaultRoundId, "") || todayISO();

      openModal("Add Job", `
        <form id="fJob" class="grid gap-3">
          <div class="grid gap-1">
            <label class="text-sm font-medium">Customer</label>
            <select name="customerId" class="px-3 py-2 rounded-xl border border-slate-200" required>
              ${customerOptionsHtml(customerId, true)}
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="grid gap-1">
              <label class="text-sm font-medium">Service</label>
              <select name="service" class="px-3 py-2 rounded-xl border border-slate-200">
                ${SERVICES.map(function(s) { return `<option>${escHtml(s)}</option>`; }).join("")}
              </select>
            </div>
            <div class="grid gap-1">
              <label class="text-sm font-medium">Frequency</label>
              <select name="frequencyWeeks" class="px-3 py-2 rounded-xl border border-slate-200">
                ${FREQS.map(function(f) { return `<option value="${f}">${escHtml(freqLabel(f))}</option>`; }).join("")}
              </select>
            </div>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Round</label>
            <select name="roundId" class="px-3 py-2 rounded-xl border border-slate-200">
              ${roundOptionsHtml(defaultRoundId)}
            </select>
            <div data-round-hint class="text-xs text-slate-500">No round selected.</div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="grid gap-1">
              <label class="text-sm font-medium">Due date</label>
              <input name="dueDate" type="date" class="px-3 py-2 rounded-xl border border-slate-200" value="${initialDate}" />
            </div>
            <div class="grid gap-1">
              <label class="text-sm font-medium">Price (£)</label>
              <input name="price" type="number" step="0.01" class="px-3 py-2 rounded-xl border border-slate-200" />
            </div>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Notes</label>
            <textarea name="notes" rows="3" class="px-3 py-2 rounded-xl border border-slate-200" placeholder="Anything about this job…"></textarea>
          </div>

          <button class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow">Save</button>
        </form>
      `);

      setupRoundAutoFill("fJob", "");

      document.getElementById("fJob").addEventListener("submit", async function(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        await createJob(Object.fromEntries(fd.entries()));
        closeModal();
        activeTab = "today";
        render();
      });
    }

    function openEditJob(jobId) {
      const j = jobs.find(function(x) { return x.id === jobId; });
      if (!j) return;

      openModal("Edit Job", `
        <form id="fEditJob" class="grid gap-3">
          <div class="grid gap-1">
            <label class="text-sm font-medium">Customer</label>
            <select name="customerId" class="px-3 py-2 rounded-xl border border-slate-200" required>
              ${customerOptionsHtml(j.customerId, false)}
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="grid gap-1">
              <label class="text-sm font-medium">Service</label>
              <select name="service" class="px-3 py-2 rounded-xl border border-slate-200">
                ${SERVICES.map(function(s) { return `<option ${(j.service === s) ? "selected" : ""}>${escHtml(s)}</option>`; }).join("")}
              </select>
            </div>
            <div class="grid gap-1">
              <label class="text-sm font-medium">Frequency</label>
              <select name="frequencyWeeks" class="px-3 py-2 rounded-xl border border-slate-200">
                ${FREQS.map(function(f) { return `<option value="${f}" ${(Number(j.frequencyWeeks) === Number(f)) ? "selected" : ""}>${escHtml(freqLabel(f))}</option>`; }).join("")}
              </select>
            </div>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Round</label>
            <select name="roundId" class="px-3 py-2 rounded-xl border border-slate-200">
              ${roundOptionsHtml(j.roundId || "")}
            </select>
            <div data-round-hint class="text-xs text-slate-500">No round selected.</div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="grid gap-1">
              <label class="text-sm font-medium">Due date</label>
              <input name="dueDate" type="date" class="px-3 py-2 rounded-xl border border-slate-200" value="${j.dueDate || todayISO()}" />
            </div>
            <div class="grid gap-1">
              <label class="text-sm font-medium">Price (£)</label>
              <input name="price" type="number" step="0.01" class="px-3 py-2 rounded-xl border border-slate-200" value="${Number(j.price || 0)}" />
            </div>
          </div>

          <div class="grid gap-1">
            <label class="text-sm font-medium">Notes</label>
            <textarea name="notes" rows="3" class="px-3 py-2 rounded-xl border border-slate-200">${escHtml(j.notes || "")}</textarea>
          </div>

          <button class="px-3 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow">Save</button>
        </form>
      `);

      setupRoundAutoFill("fEditJob", jobId);

      document.getElementById("fEditJob").addEventListener("submit", async function(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        await updateJob(jobId, Object.fromEntries(fd.entries()));
        closeModal();
      });
    }

    document.querySelectorAll(".tab").forEach(function(b) {
      b.addEventListener("click", function() {
        activeTab = b.dataset.tab;
        render();
      });
    });

    $("btnAddCustomer").addEventListener("click", openAddCustomer);
    $("btnAddJob").addEventListener("click", function() { openAddJob(); });

    onAuthStateChanged(auth, async function(user) {
      if (!user) return;
      uid = user.uid;
      await refreshAll();
    });

    async function boot() {
      subhead.textContent = "Signing in…";
      try {
        await signInAnonymously(auth);
      } catch (e) {
        subhead.textContent = "Auth error. Enable Anonymous Auth in Firebase.";
        console.error(e);
      }
    }

    boot();
  </script>
</body>
</html>
